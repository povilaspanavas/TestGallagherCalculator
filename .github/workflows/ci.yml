name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProbabilityCalculator.sln

      - name: Build
        run: dotnet build ProbabilityCalculator.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ProbabilityCalculator.sln --configuration Release --no-build

  client:
    name: Client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/ClientApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: src/ClientApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
