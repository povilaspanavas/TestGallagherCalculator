name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProbabilityCalculator.sln

      - name: Build
        run: dotnet build ProbabilityCalculator.sln --configuration Release --no-restore

      - name: Test
        id: dotnet-tests
        continue-on-error: true
        run: >-
          dotnet test ProbabilityCalculator.sln
          --configuration Release
          --no-build
          --settings tests/coverlet.runsettings
          --logger "trx;LogFilePrefix=test-results"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      - name: Upload .NET test results
        if: always() && steps.dotnet-tests.outcome != 'success'
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn
          retention-days: 7

      - name: Summarize .NET test results
        if: always()
        shell: pwsh
        run: |
          $trxFiles = Get-ChildItem -Path "TestResults" -Recurse -Filter "*.trx" -ErrorAction SilentlyContinue
          if (-not $trxFiles) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## .NET summary"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "No `.trx` test results were produced."
            exit 0
          }

          $namespace = @{ t = "http://microsoft.com/schemas/VisualStudio/TeamTest/2010" }
          $total = 0
          $passed = 0
          $failed = 0
          $skipped = 0

          foreach ($trxFile in $trxFiles) {
            [xml]$trx = Get-Content -Raw $trxFile.FullName
            $counters = Select-Xml -Xml $trx -Namespace $namespace -XPath "//t:ResultSummary/t:Counters" |
              Select-Object -ExpandProperty Node -First 1

            if ($null -ne $counters) {
              $total += [int]$counters.total
              $passed += [int]$counters.passed
              $failed += ([int]$counters.failed + [int]$counters.error + [int]$counters.timeout + [int]$counters.aborted)
              $skipped += ([int]$counters.notExecuted + [int]$counters.inconclusive + [int]$counters.notRunnable)
            }
          }

          $coverageFiles = Get-ChildItem -Path "TestResults" -Filter "coverage.cobertura.xml" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Directory.Name -match '^[0-9a-fA-F-]{36}$' }
          $lineCoverageByKey = @{}
          $branchCoverageByKey = @{}
          $branchTotalByKey = @{}

          foreach ($coverageFile in $coverageFiles) {
            [xml]$coverage = Get-Content -Raw $coverageFile.FullName
            foreach ($class in $coverage.coverage.packages.package.classes.class) {
              $file = [string]$class.filename

              foreach ($line in @($class.lines.line)) {
                $key = "$file`:$($line.number)"

                if (-not $lineCoverageByKey.ContainsKey($key)) {
                  $lineCoverageByKey[$key] = $false
                }

                if ([int]$line.hits -gt 0) {
                  $lineCoverageByKey[$key] = $true
                }

                if ([string]$line.branch -eq "True") {
                  $conditionCoverage = [string]$line.'condition-coverage'

                  if ($conditionCoverage -match '\((\d+)/(\d+)\)') {
                    if (-not $branchCoverageByKey.ContainsKey($key)) {
                      $branchCoverageByKey[$key] = 0
                      $branchTotalByKey[$key] = [int]$Matches[2]
                    }

                    $branchCoverageByKey[$key] = [math]::Max($branchCoverageByKey[$key], [int]$Matches[1])
                  }
                }
              }
            }
          }

          $linesCovered = @($lineCoverageByKey.Values | Where-Object { $_ }).Count
          $linesValid = $lineCoverageByKey.Count
          $branchesCovered = ($branchCoverageByKey.Values | Measure-Object -Sum).Sum
          $branchesValid = ($branchTotalByKey.Values | Measure-Object -Sum).Sum

          $lineCoverage = if ($linesValid -gt 0) { [math]::Round(($linesCovered / $linesValid) * 100, 2) } else { $null }
          $branchCoverage = if ($branchesValid -gt 0) { [math]::Round(($branchesCovered / $branchesValid) * 100, 2) } else { $null }
          $testStatusIcon = if ($failed -eq 0 -and $total -gt 0) { "✅" } else { "❌" }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## .NET summary"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Metric | Value |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| --- | ---: |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Test results | $testStatusIcon $passed passed / $total total |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Failed | $failed |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Skipped | $skipped |"

          if ($null -ne $lineCoverage) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Line coverage | $lineCoverage% |"
          }

          if ($null -ne $branchCoverage) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Branch coverage | $branchCoverage% |"
          }

      - name: Fail job if .NET tests failed
        if: steps.dotnet-tests.outcome != 'success'
        run: exit 1

  client-app:
    name: ClientApp
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/ClientApp

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: src/ClientApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
